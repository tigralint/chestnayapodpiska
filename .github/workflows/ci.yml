name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate || true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run coverage

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size
        run: |
          BUILD_SIZE=$(du -sh dist/ | cut -f1)
          echo "📦 Bundle size: $BUILD_SIZE"
          # Fail if dist exceeds 5MB (reasonable for a SPA with lazy loading)
          MAX_SIZE_KB=5120
          ACTUAL_KB=$(du -sk dist/ | cut -f1)
          if [ "$ACTUAL_KB" -gt "$MAX_SIZE_KB" ]; then
            echo "::error::Bundle size ${ACTUAL_KB}KB exceeds ${MAX_SIZE_KB}KB limit"
            exit 1
          fi
